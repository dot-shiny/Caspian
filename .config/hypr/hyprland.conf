# --- MONITOR ---
monitor = , preferred, auto, 1

workspace = w[t1], gapsout:30 0 0 0

# --- AUTOSTART DÆMONS ---
exec-once = python ~/dotfiles/.config/hypr/scripts/caspian_hooks.py
exec-once = python ~/dotfiles/.config/hypr/scripts/caspian_eyes.py
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP 
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentification-agent-1

env = QT_QPA_PLATFORMTHEME, qt5ct
env = QT_QPA_PLATFORMTHEME, qt6ct

# --- NO ANIME IN THIS ROOM ---
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# --- WORKSPACES BTCH ---
plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(1a1a1a)
        workspace_method = center current # [center [visiting, dual, selection] ornaments]

        active_border = rgb(fa0567)
        inactive_border = rgb(73022f)
    }
}

# --- AUTOSTART ---
exec-once = waybar > /dev/null 2>&1 & awww-daemon && awww img ~/dotfiles/wallpapers/THAhando.jpeg & hyprpm reload

# --- INPUT ---
binds {
    allow_workspace_cycles = true
    focus_preferred_method = 0
}          

# --- LAYERS OF FEAR ---
# Удерживаем окна на экране
windowrule = move onscreen, match:title ^(.*)$

# Режим FLOAT (как в GNOME)
windowrule = float 1, match:class ^(.*)$

# Открываем новые окна со сдвигом на 80 пикселей вниз (строго ПОД Waybar)
windowrule = move 10 125, match:class ^(.*)$

# Персональные правила для CASPIAN_DIALOG
windowrule = center 1, match:class ^(CASPIAN_DIALOG)$
windowrule = move 15 40, match:class ^(CASPIAN_DIALOG)$

input { 
    kb_layout = us, ru
    kb_options = grp:alt_shift_toggle 
    follow_mouse = 1
    float_switch_override_focus = 2
    repeat_delay = 600 
    repeat_rate = 20
    force_no_accel = true
    emulate_discrete_scroll = 0
}

# --- STYLE (The "Creation" Part) ---
general {
    resize_on_border = true
    extend_border_grab_area = 7 

    gaps_in = 2 
    gaps_out = 0  
    border_size = 0 
    col.active_border = rgba(a00342ff) 
    col.inactive_border = rgba(a00342ff)

    # Сила прилипания флоат-окон к краям экрана и Waybar при ручном перемещении
    snap {
        enabled = true
        window_gap = 10
        monitor_gap = 20
    }
}

# --- THE CONTROL DECK ---
$mainMod = SUPER

# --- DAAAMN SO HOT ---
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# Управление окнами мышкой
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ПОЛНОЦЕННЫЙ ГРАФИЧЕСКИЙ АЛЬТ-ТАБ С МИНИАТЮРАМИ ОКON (Rofi Wayland)
# Вызывает меню со списком окон. Полная свобода курсора мыши, скролла и кликов.
bind = ALT, Tab, exec, rofi -show window -theme ~/dotfiles/.config/rofi/alt_tab.rasi

# Обзор рабочих мест на Win+Tab
bind = SUPER, Tab, hyprexpo:expo, toggle
bindr = SUPER, mouse:274, hyprexpo:expo, toggle

# Win + Numpad 7 = Open Terminal (Foot)
bind = $mainMod, KP_Home, exec, foot

# Win + Numpad 8 = Open App Menu (Wofi)
bind = $mainMod, KP_Up, exec, WAYLAND_DISPLAY=wayland-1 wofi --show drun

# Win + Numpad 9 = Close Window
bind = $mainMod, KP_Prior, killactive,

# Win + Numpad 0 = Emergency Exit System
bind = $mainMod, KP_Insert, exit,

# --- CLIPBOARD ---
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# --- CLIPHISTORY ---
bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# --- THE VIBE (Decoration) ---
decoration { 
    rounding = 6           
    active_opacity = 1  
    inactive_opacity = 0.6 

    blur { 
        enabled = true size = 4 
        passes = 2 
        new_optimizations = true
    }

# --- NEW SYNTAX FOR SHADOWS ---
    shadow {
        enabled = false
        range = 8
        render_power = 3
        color = rgba(a3005aff)
    }
}

# --- BADBARS(Decoration) ---
plugin {
    hyprbars {
        bar_height = 25
        bar_color = rgb(73022f)
        col.text = rgb(ffffff)
  
        bar_part_of_window = true

        bar_text_font = JetBrainsMono Nerd Font
        bar_text_size = 8


        hyprbars-button = rgb(fa0567), 10,    , hyprctl dispatch killactive #CLOSE
        hyprbars-button = rgb(fa0567), 10,  , hyprctl dispatch fullscreen 1  #SCALE
        hyprbars-button = rgb(fa0567), 10,  , hyprctl dispatch movetoworkspacesilent special #HIDE
    }
}

# --- PLEASE ---
general {
    allow_tearing = false
}
